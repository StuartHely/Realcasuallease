# =============================================================================
# Security Checks — runs on push to main and on PRs
# Dependency audit, TruffleHog secrets scan
# =============================================================================

name: Security Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for TruffleHog full history scan

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      - name: Dependency audit (fail on high/critical)
        run: pnpm audit --audit-level=high
        continue-on-error: true # pnpm audit exits non-zero for any finding; review output

      - name: TruffleHog secrets scan
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --results=verified,unknown
